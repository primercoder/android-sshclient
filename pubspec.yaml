name: ssh_client
description: "Android SSH Client with chat-style session management, LAN scanning, SCP file transfer, and host fingerprint identification."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # SSH
  dartssh2: ^2.9.0

  # 数据库
  sqlite3: ^3.3.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # 状态管理
  flutter_riverpod: ^2.4.0

  # 文件选择与存储 (Android 14+ SAF)
  file_picker: ^8.0.0
  open_filex: ^4.4.0
  share_plus: ^7.2.0

  # 权限
  permission_handler: ^11.3.0

  # UI 增强
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3

  # 工具
  wakelock_plus: ^1.1.0
  flutter_local_notifications: ^17.0.0
  intl: ^0.19.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
